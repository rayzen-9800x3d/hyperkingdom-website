<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Official Portal</title>
    <style>
        /* التصميم الجديد بالكامل مدمج هنا */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 80%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* حالة السيرفر العائمة */
        .status-indicator {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #3b82f6;
            font-weight: bold; z-index: 1000; cursor: pointer;
            backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* قائمة اللاعبين - تم تعديلها لتظهر بوضوح */
        .player-list-container {
            position: fixed; top: 80px; left: 20px;
            background: rgba(15, 23, 42, 0.95); padding: 15px;
            border-radius: 15px; border: 1px solid #3b82f6;
            width: 220px; max-height: 300px; overflow-y: auto;
            z-index: 1000; display: none;
        }
        .player-item {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .player-item img { width: 24px; height: 24px; border-radius: 4px; }
        .player-item span { font-size: 0.85rem; color: #60a5fa; font-family: monospace; }

        /* شاشة الدخول */
        .main-wrapper {
            width: 380px; padding: 40px; text-align: center;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
        }

        /* القائمة السرية والسايدبار */
        .secret-menu { display: none; width: 100%; height: 100%; flex-direction: row-reverse; }
        .sidebar {
            width: 300px; height: 100vh; background: rgba(15, 23, 42, 0.98);
            border-left: 2px solid #3b82f6; padding: 25px; 
            display: flex; flex-direction: column; gap: 15px;
        }
        .user-profile {
            display: flex; align-items: center; gap: 12px;
            background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 15px;
        }
        .user-profile img { width: 45px; height: 45px; border-radius: 10px; border: 1px solid #3b82f6; }

        .btn {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid #3b82f6; border-radius: 10px;
            color: white; cursor: pointer; text-decoration: none; text-align: center; font-weight: bold;
        }
        .btn:hover { background: #3b82f6; }

        .game-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid #10b981; text-align: center;
        }

        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ip-card {
            background: rgba(16, 185, 129, 0.1); border: 2px dashed #10b981;
            padding: 30px; border-radius: 20px; text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="status-indicator" onclick="togglePlayers()">
        <span id="dot" style="color: gray;">●</span> In Game: <span id="online-count">...</span>
    </div>
    <div id="player-box" class="player-list-container">
        <h4 style="font-size: 0.8rem; color: #3b82f6; margin-bottom: 10px;">PLAYERS ONLINE:</h4>
        <div id="list-content"></div>
    </div>

    <div id="login" class="main-wrapper">
        <h1 style="color:#3b82f6; margin-bottom: 20px;">HYPERKINGDOM</h1>
        <div style="width:80px; height:80px; margin: 0 auto 15px; border-radius:15px; overflow:hidden; border:2px solid #3b82f6;">
            <img id="head-img" src="https://mc-heads.net/avatar/steve" style="width:100%;">
        </div>
        <input type="text" id="username" placeholder="Minecraft Name" onkeyup="updateSkin()" style="width:100%; padding:12px; border-radius:8px; border:1px solid #3b82f6; background:#000; color:#fff; text-align:center; margin-bottom:15px;">
        <div style="background:rgba(59,130,246,0.1); padding:10px; border-radius:10px; margin-bottom:15px;">
            <p id="math-q"></p>
            <input type="number" id="math-a" placeholder="?" style="width:60px; padding:5px; margin-top:5px; text-align:center;">
        </div>
        <button class="btn" onclick="login()" style="background:#3b82f6;">ENTER PORTAL</button>
    </div>

    <div id="portal" class="secret-menu">
        <div class="sidebar">
            <div class="user-profile">
                <img id="side-head" src="https://mc-heads.net/avatar/steve">
                <span id="side-name">Player</span>
            </div>
            <button class="btn" onclick="alert('Owner: Omar')">CREDITS</button>
            <button class="btn" onclick="alert('Discord: ryzen_98oox3d')">SUPPORT</button>
            <a href="https://discord.gg/pmwuB2fY" target="_blank" class="btn" style="background:#5865f2; border:none;">DISCORD</a>
            
            <div class="game-box">
                <p style="font-size:0.7rem; opacity:0.7;">DAILY GAME</p>
                <h3 id="rand-game" style="color:#10b981; margin:10px 0;">---</h3>
                <button class="btn" style="padding:5px; font-size:0.8rem; border-color:#10b981;" onclick="pickGame()">PICK GAME</button>
            </div>
            <button class="btn" style="margin-top:auto; border-color:#ef4444; color:#ef4444;" onclick="location.reload()">LOGOUT</button>
        </div>
        <div class="content">
            <h1 style="color:#10b981; font-size:3rem; margin-bottom:10px;">HYPERKINGDOM</h1>
            <div class="ip-card" onclick="navigator.clipboard.writeText('hyperkingdom.mcsh.io'); alert('IP Copied!')">
                <h2 style="color:#10b981;">hyperkingdom.mcsh.io</h2>
                <p style="font-size:0.8rem; opacity:0.6;">[ CLICK TO COPY ]</p>
            </div>
        </div>
    </div>
