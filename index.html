<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Official Portal</title>
    <style>
        /* التصميم الأسطوري - الـ Layout القديم الفخم */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 80%);
            color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Status Indicator - شكل احترافي */
        .status-card {
            position: fixed; top: 20px; left: 20px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            z-index: 1000; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .status-card:hover { transform: scale(1.05); background: rgba(59, 130, 246, 0.2); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #6b7280; }
        .dot.online { background: #10b981; box-shadow: 0 0 10px #10b981; }

        /* Player List - الـ Playlist اللي بتظهر بانسيابية */
        .player-dropdown {
            position: fixed; top: 80px; left: 20px;
            background: rgba(15, 23, 42, 0.95); width: 240px;
            max-height: 400px; overflow-y: auto; border-radius: 15px;
            border: 1px solid rgba(59, 130, 246, 0.5); display: none;
            z-index: 1000; backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .list-header { padding: 12px; border-bottom: 1px solid rgba(59, 130, 246, 0.3); font-size: 0.8rem; color: #60a5fa; font-weight: bold; }
        .player-row {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .player-row:hover { background: rgba(59, 130, 246, 0.1); }
        .player-row img { width: 28px; height: 28px; border-radius: 5px; border: 1px solid #3b82f6; }
        .player-row span { font-size: 0.9rem; font-family: 'Consolas', monospace; color: #e2e8f0; }

        /* Login Screen - الشاشة اللي بتفتح النفس */
        .glass-box {
            width: 400px; padding: 40px; background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            backdrop-filter: blur(20px); text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .avatar-preview {
            width: 90px; height: 90px; margin: 0 auto 20px; border-radius: 20px;
            border: 2px solid #3b82f6; overflow: hidden; background: #000;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
        input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid #1e40af; background: rgba(0,0,0,0.4); color: white;
            text-align: center; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        /* Sidebar & Layout */
        .portal-container { display: none; width: 100%; height: 100vh; flex-direction: row-reverse; }
        .sidebar {
            width: 320px; background: rgba(15, 23, 42, 0.98); height: 100%;
            border-left: 2px solid #3b82f6; padding: 30px 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .profile-section {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .side-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #3b82f6;
            background: transparent; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-decoration: none; text-align: center;
        }
        .side-btn:hover { background: #3b82f6; transform: translateX(-5px); }

        .game-picker {
            background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981;
            padding: 15px; border-radius: 15px; text-align: center;
        }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ip-box {
            background: rgba(16, 185, 129, 0.1); border: 2px dashed #10b981;
            padding: 40px; border-radius: 25px; cursor: pointer; transition: 0.3s;
        }
        .ip-box:hover { transform: scale(1.03); background: rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="status-card" onclick="toggleList()">
        <div id="status-dot" class="dot"></div>
        <span>In Game: <span id="online-count">---</span></span>
    </div>

    <div id="player-dropdown" class="player-dropdown">
        <div class="list-header">ONLINE PLAYERS</div>
        <div id="player-rows-container"></div>
    </div>

    <div id="login-page" class="glass-box">
        <h1 style="color:#3b82f6; letter-spacing:4px; margin-bottom:20px;">HYPERKINGDOM</h1>
        <div class="avatar-preview">
            <img id="login-head" src="https://mc-heads.net/avatar/steve" style="width:100%;">
        </div>
        <input type="text" id="user-input" placeholder="Your Minecraft Name" oninput="liveUpdateHead()">
        <div style="background:rgba(59,130,246,0.1); padding:15px; border-radius:12px; margin-bottom:15px;">
            <p id="math-text" style="color:#60a5fa; font-weight:bold;"></p>
            <input type="number" id="math-input" placeholder="Result?" style="width:100px; margin:10px 0 0 0;">
        </div>
        <button class="side-btn" onclick="tryLogin()" style="background:#3b82f6; border:none;">ENTER PORTAL</button>
    </div>

    <div id="portal-page" class="portal-container">
        <div class="sidebar">
            <div class="profile-section">
                <img id="side-head" src="https://mc-heads.net/avatar/steve" style="width:45px; height:45px; border-radius:8px;">
                <span id="display-name" style="font-weight:bold; font-size:1.1rem;">---</span>
            </div>
            
            <button class="side-btn" onclick="alert('Owner: Omar\nDiscord: ryzen_98oox3d')">CREDITS & SUPPORT</button>
            <a href="https://discord.gg/pmwuB2fY" target="_blank" class="side-btn" style="background:#5865f2; border:none;">OFFICIAL DISCORD</a>

            <div class="game-picker">
                <p style="font-size:0.7rem; opacity:0.7; margin-bottom:5px;">RANDOM GAME</p>
                <h3 id="picked-game" style="color:#10b981; margin-bottom:10px;">---</h3>
                <button class="side-btn" style="padding:8px; font-size:0.8rem; border-color:#10b981;" onclick="rollGame()">PICK FOR ME</button>
            </div>

            <button class="side-btn" style="margin-top:auto; color:#ef4444; border-color:#ef4444;" onclick="location.reload()">LOGOUT</button>
        </div>

        <div class="main-content">
            <h1 style="color:#10b981; font-size:3.5rem; margin-bottom:10px; text-shadow: 0 0 20px rgba(16,185,129,0.4);">HYPERKINGDOM</h1>
            <p style="opacity:0.6; letter-spacing:5px; font-weight:bold; margin-bottom:40px;">OFFICIAL SERVER PORTAL</p>
            
            <div class="ip-box" onclick="copyIP()">
                <h2 style="color:#10b981; font-family:monospace; letter-spacing:2px;">hyperkingdom.mcsh.io</h2>
                <p style="margin-top:10px; font-size:0.8rem; opacity:0.5;">[ CLICK TO COPY SERVER IP ]</p>
            </div>
        </div>
    </div>

    <script>
        const serverIP = "hyperkingdom.mcsh.io";
        const gamesList = ["Survival", "OneBlock", "BedWars", "The Bridge", "Murder Mystery", "LifestealSMP", "CountrySMP", "Infinite Parkour", "2B2T"];
        let mathAnswer;

        // 1. تحديث السكن لحظياً (Fixed)
        function liveUpdateHead() {
            const name = document.getElementById('user-input').value.trim();
            if(name.length > 0) {
                const url = `https://mc-heads.net/avatar/${name}`;
                document.getElementById('login-head').src = url;
                document.getElementById('side-head').src = url;
            }
        }

        // 2. فحص السيرفر (أسرع وأدق بنظام الـ Anti-Undefined)
        async function checkServer() {
            try {
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}?t=${Date.now()}`);
                const data = await res.json();
                
                const dot = document.getElementById('status-dot');
                const countText = document.getElementById('online-count');
                const listCont = document.getElementById('player-rows-container');

                if(data.online) {
                    dot.classList.add('online');
                    countText.innerText = data.players.online;
                    
                    if(data.players.list && data.players.list.length > 0) {
                        listCont.innerHTML = data.players.list
                            .filter(p => p.name && p.name !== "undefined")
                            .map(p => `
                                <div class="player-row">
                                    <img src="https://mc-heads.net/avatar/${p.name}" onerror="this.src='https://mc-heads.net/avatar/steve'">
                                    <span>${p.name}</span>
                                </div>
                            `).join('');
                    } else if (data.players.online > 0) {
                        listCont.innerHTML = `<p style="padding:20px; text-align:center; font-size:0.8rem; color:#60a5fa;">${data.players.online} Players Active</p>`;
                    } else {
                        listCont.innerHTML = `<p style="padding:20px; text-align:center; font-size:0.8rem; color:#666;">No Players</p>`;
                    }
                } else {
                    dot.classList.remove('online');
                    countText.innerText = "OFFLINE";
                    listCont.innerHTML = `<p style="padding:20px; text-align:center; color:#ef4444;">Server Down</p>`;
                }
            } catch(e) { console.log("Status Error"); }
        }

        // 3. نظام المسائل الرياضية والدخول
        function setupQuiz() {
            const n1 = Math.floor(Math.random() * 9) + 2;
            const n2 = Math.floor(Math.random() * 9) + 2;
            mathAnswer = n1 + n2;
            document.getElementById('math-text').innerText = `Math Check: ${n1} + ${n2} = ?`;
        }

        function tryLogin() {
            const user = document.getElementById('user-input').value.trim();
            const ans = document.getElementById('math-input').value;
            if(user && parseInt(ans) === mathAnswer) {
                document.getElementById('display-name').innerText = user;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('portal-page').style.display = 'flex';
            } else {
                alert("Incorrect math or empty name!");
                setupQuiz();
                document.getElementById('math-input').value = "";
            }
        }

        // وظائف إضافية
        function toggleList() {
            const box = document.getElementById('player-dropdown');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function rollGame() {
            const res = document.getElementById('picked-game');
            let i = 0;
            const anim = setInterval(() => {
                res.innerText = gamesList[Math.floor(Math.random() * gamesList.length)];
                i++;
                if(i > 10) clearInterval(anim);
            }, 70);
        }

        function copyIP() {
            navigator.clipboard.writeText(serverIP);
            alert("HyperKingdom IP Copied!");
        }

        // تشغيل البداية
        setupQuiz();
        checkServer();
        setInterval(checkServer, 4000); // تحديث كل 4 ثواني (توازن مثالي بين السرعة والثبات)
    </script>
</body>
</html>
