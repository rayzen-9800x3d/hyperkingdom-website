<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Official Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 80%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            direction: ltr;
        }
        /* حالة السيرفر علجمب */
        .status-indicator {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7); padding: 12px 20px;
            border-radius: 15px; border: 1px solid #3b82f6;
            font-weight: bold; z-index: 100; cursor: pointer;
        }
        /* قائمة اللاعبين */
        .player-list-container {
            position: fixed; top: 85px; left: 20px;
            background: rgba(15, 23, 42, 0.95); padding: 15px;
            border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.4);
            width: 220px; max-height: 350px; overflow-y: auto;
            z-index: 100; backdrop-filter: blur(10px); display: none;
        }
        .player-item {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .player-item img { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #3b82f6; }
        .player-item span { font-size: 0.85rem; font-family: monospace; color: #60a5fa; }

        /* شاشة الدخول */
        .main-wrapper {
            width: 90%; max-width: 450px; padding: 40px; text-align: center;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
        }
        .secret-menu { display: none; width: 100%; height: 100%; flex-direction: row-reverse; }
        .sidebar {
            width: 320px; height: 100vh; background: rgba(15, 23, 42, 0.98);
            border-left: 1px solid #3b82f6; padding: 30px 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .user-profile {
            display: flex; align-items: center; gap: 12px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            padding: 15px; border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .user-profile img { width: 45px; height: 45px; border-radius: 10px; border: 1px solid #3b82f6; }
        .sidebar-btn {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 12px;
            color: white; cursor: pointer; font-weight: 600; transition: 0.3s; text-align: center; text-decoration: none;
        }
        .sidebar-btn:hover { background: #3b82f6; transform: translateX(-5px); }
        .game-selector-box {
            margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4);
            border-radius: 15px; border: 1px solid #10b981; text-align: center;
        }
        #chosen-game { font-size: 1.1rem; color: #10b981; font-weight: bold; margin: 10px 0; }
        .content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .ip-card {
            background: rgba(16, 185, 129, 0.1); border: 2px dashed #10b981;
            padding: 30px; border-radius: 20px; text-align: center; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #0f172a;
            border: 2px solid #3b82f6; padding: 30px; border-radius: 20px; z-index: 1000; width: 320px;
        }
    </style>
</head>
<body>

    <div class="status-indicator" onclick="togglePlayerList()">
        <span id="status-dot" style="display:inline-block; width:10px; height:10px; border-radius:50%; background:gray; margin-right:8px;"></span>
        In Game: <span id="is-online">CHECKING...</span>
    </div>

    <div id="player-list-box" class="player-list-container">
        <p style="font-size: 0.8rem; color: #3b82f6; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #3b82f6; padding-bottom: 5px;">ONLINE PLAYERS</p>
        <div id="players-wrapper"></div>
    </div>

    <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:900;" onclick="closeModal()"></div>
    <div id="infoModal" class="modal">
        <h3 id="modalTitle" style="color:#3b82f6;"></h3>
        <div id="modalBody" style="margin-top:15px; line-height:1.6; text-align:center;"></div>
        <button class="sidebar-btn" style="margin-top:20px; background:#3b82f6;" onclick="closeModal()">Close</button>
    </div>

    <div class="main-wrapper" id="login-screen">
        <h1 style="color:#3b82f6; letter-spacing:5px; margin-bottom:20px;">HYPERKINGDOM</h1>
        <div style="width:100px; height:100px; margin: 0 auto 20px; border-radius:15px; overflow:hidden; border:2px solid #3b82f6; background:#000;">
            <img id="pHead" src="https://mc-heads.net/avatar/steve" style="width:100%;">
        </div>
        <input type="text" id="pName" placeholder="Minecraft Username" onkeyup="updateSkin()" 
               style="width:100%; padding:15px; background:rgba(0,0,0,0.5); border:1px solid #1e40af; color:white; border-radius:12px; text-align:center; outline:none;">
        
        <div style="background:rgba(59, 130, 246, 0.1); padding:15px; border-radius:12px; margin: 20px 0; border: 1px solid rgba(59,130,246,0.2);">
            <p id="mathQ" style="font-weight:bold; color:#60a5fa;"></p>
            <input type="number" id="mathA" placeholder="?" style="width:60px; padding:8px; margin-top:10px; text-align:center; background:#000; border:1px solid #3b82f6; color:white; border-radius:5px;">
        </div>
        <button class="sidebar-btn" onclick="unlock()" style="background:#3b82f6; border:none;">ACCESS PORTAL</button>
    </div>

    <div id="secret-portal" class="secret-menu">
        <div class="sidebar">
            <div class="user-profile">
                <img id="menuHead" src="https://mc-heads.net/avatar/steve">
                <span id="displayName">---</span>
            </div>
            <div class="sidebar-btn" onclick="openModal('OWNER', 'Managed by: <b>Omar</b>')">CREDITS</div>
            <div class="sidebar-btn" onclick="openModal('SUPPORT', 'Discord: <b>ryzen_98oox3d</b>')">SUPPORT</div>
            <a href="https://discord.gg/pmwuB2fY" target="_blank" class="sidebar-btn">DISCORD SERVER</a>
            <div class="game-selector-box">
                <p style="font-size: 0.75rem; opacity:0.7;">RANDOM GAME</p>
                <div id="chosen-game">---</div>
                <button class="sidebar-btn" style="padding:8px; font-size:0.8rem; border-color:#10b981;" onclick="pickRandomGame()">PICK</button>
            </div>
            <div class="sidebar-btn" style="margin-top:auto; color:#ef4444; border-color:#ef4444;" onclick="location.reload()">LOGOUT</div>
        </div>

        <div class="content-area">
            <h2 style="color:#10b981; font-size:2.5rem; margin-bottom:10px;">HYPERKINGDOM</h2>
            <p style="margin-bottom:40px; opacity:0.6; letter-spacing:2px;">OFFICIAL SERVER PORTAL</p>
            <div class="ip-card" onclick="copyIP()">
                <span style="font-size: 1.8rem; font-family: monospace; letter-spacing:3px;">hyperkingdom.mcsh.io</span>
                <p style="font-size: 0.8rem; color:#10b981; margin-top:10px; font-weight:bold;">[ CLICK TO COPY IP ]</p>
            </div>
        </div>
    </div>

    <script>
        const serverIP = "hyperkingdom.mcsh.io";
        const games = ["Survival", "OneBlock", "BedWars", "The Bridge", "Murder Mystery", "LifestealSMP", "CountrySMP", "Infinite Parkour", "2B2T"];
        let correctValue;

        async function checkServerStatus() {
            try {
                // إضافة timestamp عشوائي لإجبار الـ API على التحديث اللحظي
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}?t=${Date.now()}`);
                const data = await res.json();
                
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('is-online');
                const wrapper = document.getElementById('players-wrapper');
                
                if(data.online) {
                    dot.style.background = "#10b981";
                    text.innerText = `YES (${data.players.online})`;
                    
                    // جلب قائمة اللاعبين
                    if (data.players.list && data.players.list.length > 0) {
                        wrapper.innerHTML = data.players.list.map(p => `
                            <div class="player-item">
                                <img src="https://mc-heads.net/avatar/${p.name}" alt="head">
                                <span>${p.name}</span>
                            </div>
                        `).join('');
                    } else if (data.players.online > 0) {
                        wrapper.innerHTML = `<p style="text-align:center; font-size:0.8rem; color:#aaa;">${data.players.online} Players Online<br>(Names Hidden)</p>`;
                    } else {
                        wrapper.innerHTML = `<p style="text-align:center; font-size:0.8rem; color:#666;">No Players</p>`;
                    }
                } else {
                    dot.style.background = "#ef4444";
                    text.innerText = "NO";
                    wrapper.innerHTML = `<p style="text-align:center; color:#ef4444;">Server Offline</p>`;
                }
            } catch(e) { console.log("Update Error"); }
        }

        function togglePlayerList() {
            const box = document.getElementById('player-list-box');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function updateSkin() {
            let name = document.getElementById('pName').value.trim();
            if(name.length > 2) {
                document.getElementById('pHead').src = `https://mc-heads.net/avatar/${name}`;
                document.getElementById('menuHead').src = `https://mc-heads.net/avatar/${name}`;
            }
        }

        function pickRandomGame() {
            const display = document.getElementById('chosen-game');
            let count = 0;
            const interval = setInterval(() => {
                display.innerText = games[Math.floor(Math.random() * games.length)];
                count++;
                if(count > 10) { clearInterval(interval); display.style.color = "#10b981"; }
            }, 80);
        }

        function refreshMath() {
            let n1 = Math.floor(Math.random() * 9) + 2;
            let n2 = Math.floor(Math.random() * 9) + 2;
            correctValue = n1 + n2;
            document.getElementById('mathQ').innerText = `${n1} + ${n2} = ?`;
        }

        function unlock() {
            let name = document.getElementById('pName').value.trim();
            let ans = document.getElementById('mathA').value;
            if(name && parseInt(ans) === correctValue) {
                document.getElementById('displayName').innerText = name;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('secret-portal').style.display = 'flex';
            } else { refreshMath(); }
        }

        function copyIP() { navigator.clipboard.writeText(serverIP); alert("IP Copied!"); }
        function openModal(t, b) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalBody').innerHTML = b;
            document.getElementById('infoModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // تحديث كل 5 ثواني (صاروخ ومستقر)
        checkServerStatus();
        setInterval(checkServerStatus, 5000);
        window.onload = refreshMath;
    </script>
</body>
</html>
