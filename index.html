<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Official Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 80%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Status & Players */
        .status-indicator {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #3b82f6;
            font-weight: bold; z-index: 1000; cursor: pointer;
        }
        .player-list-container {
            position: fixed; top: 80px; left: 20px;
            background: rgba(15, 23, 42, 0.98); padding: 15px;
            border-radius: 15px; border: 1px solid #3b82f6;
            width: 220px; max-height: 300px; overflow-y: auto;
            z-index: 1000; display: none;
        }
        .player-item {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .player-item img { width: 24px; height: 24px; border-radius: 4px; }

        /* Login Screen */
        .main-wrapper {
            width: 380px; padding: 40px; text-align: center;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #3b82f6;
            background: #000; color: #fff; text-align: center; margin-bottom: 15px; outline: none;
        }

        /* Portal Layout */
        .secret-menu { display: none; width: 100%; height: 100%; flex-direction: row-reverse; }
        .sidebar {
            width: 300px; height: 100vh; background: rgba(15, 23, 42, 1);
            border-left: 2px solid #3b82f6; padding: 25px; display: flex; flex-direction: column; gap: 15px;
        }
        .user-profile {
            display: flex; align-items: center; gap: 12px;
            background: rgba(59, 130, 246, 0.15); padding: 15px; border-radius: 15px;
        }
        .btn {
            width: 100%; padding: 12px; background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6; border-radius: 10px; color: white;
            cursor: pointer; text-decoration: none; text-align: center; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #3b82f6; }
        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ip-card {
            background: rgba(16, 185, 129, 0.1); border: 2px dashed #10b981;
            padding: 30px; border-radius: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="status-indicator" onclick="togglePlayers()">
        <span id="dot" style="color: gray;">●</span> In Game: <span id="online-count">...</span>
    </div>
    
    <div id="player-box" class="player-list-container">
        <h4 style="font-size: 0.8rem; color: #3b82f6; margin-bottom: 10px;">ONLINE NOW:</h4>
        <div id="list-content"></div>
    </div>

    <div id="login-screen" class="main-wrapper">
        <h1 style="color:#3b82f6; margin-bottom: 20px;">HYPERKINGDOM</h1>
        <div style="width:80px; height:80px; margin: 0 auto 15px; border-radius:15px; overflow:hidden; border:2px solid #3b82f6;">
            <img id="login-head" src="https://mc-heads.net/avatar/steve" style="width:100%;">
        </div>
        <input type="text" id="username-input" placeholder="Minecraft Name" oninput="updateSkinPreview()">
        
        <div style="background:rgba(59,130,246,0.1); padding:15px; border-radius:12px; margin-bottom:15px;">
            <p id="math-question" style="font-weight:bold; color:#60a5fa;"></p>
            <input type="number" id="math-answer" placeholder="?" style="width:80px; margin-top:10px; margin-bottom:0;">
        </div>
        <button class="btn" onclick="checkLogin()" style="background:#3b82f6;">ENTER PORTAL</button>
    </div>

    <div id="portal-screen" class="secret-menu">
        <div class="sidebar">
            <div class="user-profile">
                <img id="side-head" src="https://mc-heads.net/avatar/steve" style="width:45px; height:45px; border-radius:8px;">
                <span id="side-name" style="font-weight:bold;">Player</span>
            </div>
            <button class="btn" onclick="alert('Owner: Omar | Discord: ryzen_98oox3d')">INFO & SUPPORT</button>
            <a href="https://discord.gg/pmwuB2fY" target="_blank" class="btn" style="background:#5865f2; border:none;">DISCORD</a>
            
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; border:1px solid #10b981; text-align: center;">
