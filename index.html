<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Official Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 80%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Animations */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* Server Info */
        .status-card {
            position: fixed; top: 20px; left: 20px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #3b82f6;
            z-index: 1000; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
        .dot.online { background: #10b981; box-shadow: 0 0 10px #10b981; }

        .player-dropdown {
            position: fixed; top: 80px; left: 20px;
            background: rgba(15, 23, 42, 0.98); width: 240px;
            max-height: 350px; overflow-y: auto; border-radius: 15px;
            border: 1px solid #3b82f6; display: none; z-index: 1000;
        }
        .player-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-row img { width: 25px; height: 25px; border-radius: 4px; }

        /* Login Screen */
        .glass-box {
            width: 400px; padding: 40px; background: rgba(15, 23, 42, 0.9);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; backdrop-filter: blur(20px);
        }

        /* Portal Page */
        .portal-container { display: none; width: 100%; height: 100%; flex-direction: row-reverse; }
        .sidebar {
            width: 320px; background: #0f172a; border-left: 2px solid #3b82f6;
            padding: 30px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .side-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1); color: white; cursor: pointer;
            font-weight: bold; transition: 0.3s; text-align: center; text-decoration: none;
        }
        .side-btn:hover { background: #3b82f6; }

        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #1e40af; background: #000; color: white; text-align: center; outline: none; font-size: 1rem; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: float 4s infinite ease-in-out; }
        .ip-box { background: rgba(16, 185, 129, 0.1); border: 2px dashed #10b981; padding: 35px; border-radius: 20px; cursor: pointer; }

        /* Popup */
        .info-popup {
            position: fixed; right: 340px; top: 50%; transform: translateY(-50%);
            width: 320px; background: rgba(15, 23, 42, 0.95);
            border: 2px solid #3b82f6; border-radius: 20px; padding: 25px;
            display: none; z-index: 2000; animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="status-card" onclick="togglePlayerList()">
        <div id="status-dot" class="dot"></div>
        <span>Players: <span id="player-count">...</span></span>
    </div>

    <div id="player-list-box" class="player-dropdown">
        <div style="padding:10px; font-size:0.8rem; color:#3b82f6; border-bottom:1px solid #3b82f6;">ONLINE PLAYERS</div>
        <div id="list-container"></div>
    </div>

    <div id="login-screen" class="glass-box">
        <h1 style="color:#3b82f6; margin-bottom:20px;">HYPERKINGDOM</h1>
        <div style="width:80px; height:80px; margin: 0 auto 15px; border-radius:15px; border:2px solid #3b82f6; overflow:hidden; background:#000;">
            <img id="head-preview" src="https://mc-heads.net/avatar/steve" style="width:100%;">
        </div>
        
        <input type="text" id="player-name" placeholder="Minecraft Username" oninput="changeHead()">
        
        <div style="background:rgba(59, 130, 246, 0.1); padding:15px; border-radius:12px; margin-bottom:15px;">
            <p id="math-prompt" style="color:#60a5fa; font-weight:bold;">Loading math...</p>
            <input type="number" id="math-user-answer" placeholder="Result?" style="width:100px; margin-top:10px; margin-bottom:0;">
        </div>
        
        <button class="side-btn" onclick="validateAndEnter()" style="background:#3b82f6; border:none;">ENTER PORTAL</button>
    </div>

    <div id="portal-screen" class="portal-container">
        <div class="sidebar">
            <div style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
                <img id="sidebar-head" src="https://mc-heads.net/avatar/steve" style="width:40px; border-radius:5px;">
                <span id="sidebar-name" style="font-weight:bold;">---</span>
            </div>
            
            <button class="side-btn" onclick="openPopup('CREDITS', 'Owner: <b>Omar</b><br>server host: <b>mcserverhost</b><br>specs: <b>4gb ram, 10gb storage , 200% cpu</b>')">CREDITS</button>
            <button class="side-btn" onclick="openPopup('RULES', '1. Don\'t start a chat with a cornhub video.<br>2. Respect others.<br>3. Don\'t try to use hacks.<br>4. Have fun!')">SERVER RULES</button>
            <a href="https://mcsh.io" target="_blank" class="side-btn" style="border-color: #f59e0b; color: #f59e0b;">TRY SERVER HOST</a>
            <a href="https://discord.gg/pmwuB2fY" target="_blank" class="side-btn" style="background:#5865f2; border:none;">JOIN DISCORD</a>

            <div style="background:rgba(16, 185, 129, 0.1); border:1px solid #10b981; padding:15px; border-radius:12px; text-align:center; margin-top:10px;">
                <h3 id="roll-res" style="color:#10b981;">---</h3>
                <button class="side-btn" style="padding:5px; font-size:0.7rem;" onclick="doRoll()">ROLL GAME</button>
            </div>
            
            <button class="side-btn" style="margin-top:auto; color:#ef4444; border-color:#ef4444;" onclick="logout()">LOGOUT</button>
        </div>

        <div class="main-content" id="main-ui">
            <h1 style="color:#10b981; font-size:3.5rem;">HYPERKINGDOM</h1>
            <div class="ip-box" onclick="copyMyIP()">
                <h2 style="color:#10b981; font-family:monospace;">hyperkingdom.mcsh.io</h2>
                <p style="font-size:0.7rem; opacity:0.5;">[ CLICK TO COPY IP ]</p>
            </div>
        </div>
    </div>

    <div id="info-popup" class="info-popup">
        <h3 id="p-title" style="color:#3b82f6; margin-bottom:15px; border-bottom:1px solid #3b82f6; padding-bottom:5px;"></h3>
        <p id="p-body" style="font-size:0.95rem; line-height:1.7;"></p>
        <button class="side-btn" style="margin-top:20px;" onclick="closeMyPopup()">CLOSE</button>
    </div>

    <script>
        let secretAnswer;
        // تم تصليح الخطأ هنا (حذف علامة التنصيص الزائدة)
        const gamesList = ["Survival", "OneBlock", "BedWars", "The Bridge", "Lifesteal" , "murdermystery", "Skyblock"];

        // 1. Math System
        function newMath() {
            const n1 = Math.floor(Math.random() * 7) + 2;
            const n2 = Math.floor(Math.random() * 7) + 2;
            secretAnswer = n1 + n2;
            document.getElementById('math-prompt').innerText = `What is ${n1} + ${n2}?`;
        }

        // 2. Skin Update
        function changeHead(user = null) {
            const name = user || document.getElementById('player-name').value.trim();
            if(name) {
                const url = `https://mc-heads.net/avatar/${name}`;
                document.getElementById('head-preview').src = url;
                document.getElementById('sidebar-head').src = url;
            }
        }

        // 3. Login & Saving
        function validateAndEnter() {
            const u = document.getElementById('player-name').value.trim();
            const a = document.getElementById('math-user-answer').value;
            if(u && parseInt(a) === secretAnswer) {
                localStorage.setItem('hk_username', u);
                showPortal(u);
            } else {
                alert("Incorrect math or missing name!");
                newMath();
                document.getElementById('math-user-answer').value = "";
            }
        }

        function showPortal(username) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('portal-screen').style.display = 'flex';
            document.getElementById('sidebar-name').innerText = username;
            changeHead(username);
        }

        function checkPersistentLogin() {
            const savedUser = localStorage.getItem('hk_username');
            if(savedUser) {
                showPortal(savedUser);
            } else {
                newMath(); 
            }
        }

        function logout() {
            localStorage.removeItem('hk_username');
            location.reload();
        }

        async function refreshServer() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/hyperkingdom.mcsh.io');
                const data = await response.json();
                
                const dot = document.getElementById('status-dot');
                const count = document.getElementById('player-count');
                const list = document.getElementById('list-container');

                if(data.online) {
                    dot.className = 'dot online';
                    count.innerText = data.players.online;
                    if(data.players.list) {
                        list.innerHTML = data.players.list.map(name => `
                            <div class="player-row">
                                <img src="https://mc-heads.net/avatar/${name}" onerror="this.src='https://mc-heads.net/avatar/steve'">
                                <span>${name}</span>
                            </div>
                        `).join('');
                    } else {
                        list.innerHTML = `<p style="padding:15px; text-align:center; font-size:0.8rem; opacity:0.6;">No public player list</p>`;
                    }
                } else {
                    dot.className = 'dot';
                    count.innerText = "OFFLINE";
                    list.innerHTML = `<p style="padding:15px; text-align:center; color:#ef4444;">Server Down</p>`;
                }
            } catch(e) { console.error("API Error"); }
        }

        function togglePlayerList() {
            const box = document.getElementById('player-list-box');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function openPopup(title, body) {
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-body').innerHTML = body;
            document.getElementById('info-popup').style.display = 'block';
            document.getElementById('main-ui').style.opacity = '0.1';
        }

        function closeMyPopup() {
            document.getElementById('info-popup').style.display = 'none';
            document.getElementById('main-ui').style.opacity = '1';
        }

        function doRoll() {
            document.getElementById('roll-res').innerText = gamesList[Math.floor(Math.random()*gamesList.length)];
        }

        function copyMyIP() {
            navigator.clipboard.writeText('hyperkingdom.mcsh.io');
            alert('IP Copied!');
        }

        // التشغيل الابتدائي
        checkPersistentLogin(); 
        refreshServer();
        setInterval(refreshServer, 20000);
    </script>
</body>
</html>
