<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperKingdom | Ultimate Portal</title>
    <style>
        /* التنسيق الأساسي السريع */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; }
        
        .status-indicator {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 10px 15px;
            border-radius: 10px; border: 1px solid #3b82f6;
            cursor: pointer; z-index: 1000;
        }

        .player-list-container {
            position: fixed; top: 70px; left: 20px;
            background: #0f172a; border: 1px solid #1e293b;
            width: 200px; max-height: 300px; overflow-y: auto;
            display: none; padding: 10px; border-radius: 8px; z-index: 1000;
        }

        .player-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.9rem; }
        .player-item img { width: 20px; height: 20px; border-radius: 3px; }

        /* بقية التصميم اللي إنت عارفه */
        .main-wrapper { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sidebar-btn { padding: 12px 25px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .secret-menu { display: none; width: 100%; height: 100vh; flex-direction: row-reverse; }
        .sidebar { width: 300px; background: #0f172a; border-left: 1px solid #3b82f6; padding: 20px; }
        .content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #3b82f6; background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div class="status-indicator" onclick="togglePlayers()">
        <span id="dot" style="color:#ef4444;">●</span> In Game: <span id="count">0</span>
    </div>

    <div id="player-box" class="player-list-container">
        <div id="player-list">Loading...</div>
    </div>

    <div id="login" class="main-wrapper">
        <h1 style="margin-bottom:20px;">HYPERKINGDOM</h1>
        <input type="text" id="user" placeholder="Username" onkeyup="updateSkin()">
        <p id="math" style="margin:10px 0;"></p>
        <input type="number" id="ans" placeholder="?">
        <button class="sidebar-btn" onclick="login()">ENTER</button>
    </div>

    <div id="portal" class="secret-menu">
        <div class="sidebar">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <img id="side-head" src="https://mc-heads.net/avatar/steve" style="width:40px;">
                <span id="side-name">Player</span>
            </div>
            <button class="sidebar-btn" style="width:100%;" onclick="alert('Owner: Omar')">CREDITS</button>
            <div style="margin-top:20px; border:1px solid #10b981; padding:10px; border-radius:10px; text-align:center;">
                <p style="font-size:0.7rem;">RANDOM GAME</p>
                <h3 id="rand-game">---</h3>
                <button onclick="pickGame()" style="background:#10b981; border:none; padding:5px; border-radius:5px; color:white; cursor:pointer; margin-top:5px;">PICK</button>
            </div>
        </div>
        <div class="content-area">
            <h1 style="color:#10b981;">HYPERKINGDOM</h1>
            <p>IP: hyperkingdom.mcsh.io</p>
        </div>
    </div>

    <script>
        const ip = "hyperkingdom.mcsh.io";
        const games = ["Survival", "OneBlock", "BedWars", "The Bridge", "Murder Mystery", "LifestealSMP", "CountrySMP", "Infinite Parkour", "2B2T"];
        let correct;

        // دالة التحديث "الصاروخية"
        async function update() {
            try {
                // استخدام API مختلف تماماً وكسر الكاش بـ Random
                const res = await fetch(`https://api.minetools.eu/ping/${ip.replace(':', '/')}/${Math.floor(Math.random()*999)}`);
                const data = await res.json();
                
                if(data.error) return;

                document.getElementById('dot').style.color = "#10b981";
                document.getElementById('count').innerText = data.players.online;
                
                let list = document.getElementById('player-list');
                if(data.players.sample && data.players.sample.length > 0) {
                    list.innerHTML = data.players.sample.map(p => `
                        <div class="player-item">
                            <img src="https://mc-heads.net/avatar/${p.name}">
                            <span>${p.name}</span>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "No names available";
                }
            } catch(e) {}
        }

        // لو الـ API اللي فوق فشل، ده API احتياطي شغال في الخلفية
        async function backupUpdate() {
            const res = await fetch(`https://mcapi.us/server/status?ip=${ip}`);
            const data = await res.json();
            if(data.online) {
                document.getElementById('count').innerText = data.players.now;
            }
        }

        function togglePlayers() {
            let b = document.getElementById('player-box');
            b.style.display = b.style.display === 'block' ? 'none' : 'block';
        }

        function updateSkin() {
            let n = document.getElementById('user').value;
            document.getElementById('side-head').src = `https://mc-heads.net/avatar/${n}`;
        }

        function pickGame() {
            document.getElementById('rand-game').innerText = games[Math.floor(Math.random()*games.length)];
        }

        function login() {
            let u = document.getElementById('user').value;
            let a = document.getElementById('ans').value;
            if(u && parseInt(a) === correct) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('side-name').innerText = u;
            } else { gen(); }
        }

        function gen() {
            let n1 = Math.floor(Math.random()*10), n2 = Math.floor(Math.random()*10);
            correct = n1 + n2;
            document.getElementById('math').innerText = `${n1} + ${n2} = ?`;
        }

        setInterval(update, 2000); // تحديث كل ثانيتين!
        setInterval(backupUpdate, 10000); 
        gen();
        update();
    </script>
</body>
</html>
